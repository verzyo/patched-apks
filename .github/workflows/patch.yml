name: Auto Build and Release Patched APKs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Rebuild every app (ignore incremental check)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 2 * * *'  # Daily at 4 AM CEST

jobs:
  download-tools:
    name: Download Tools
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.cache-key }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Download Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          curl -L "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all.jar" -o tools/revanced-cli.jar
          curl -L "https://github.com/revanced/revanced-patches/releases/latest/download/patches.jar" -o tools/patches.jar
          curl -L "https://github.com/revanced/revanced-integrations/releases/latest/download/app-release-unsigned.apk" -o tools/integrations.apk
      
      - name: Cache Tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}
      
      - name: Generate Cache Key
        id: cache-key
        run: echo "cache-key=${{ steps.cache-tools.outputs.cache-key || 'no-cache' }}" >> $GITHUB_OUTPUT

  check-updates:
    name: Check for Updates
    needs: download-tools
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      build_matrix: ${{ steps.check.outputs.build_matrix }}
      update_count: ${{ steps.check.outputs.update_count }}
      total_count: ${{ steps.check.outputs.total_count }}
      carry_count: ${{ steps.check.outputs.carry_count }}
      incremental: ${{ steps.check.outputs.incremental }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate GitHub Auth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/validate_github_auth.py

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Run Incremental Update Check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_REBUILD: ${{ inputs.force_full_rebuild || 'false' }}
        run: |
          python scripts/check_app_updates.py

      - name: Show Plan Summary
        run: |
          echo "Total entries:   ${{ steps.check.outputs.total_count }}"
          echo "Need rebuild:    ${{ steps.check.outputs.update_count }}"
          echo "Carry over:      ${{ steps.check.outputs.carry_count }}"
          echo "Incremental:     ${{ steps.check.outputs.incremental }}"

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: |
            build_matrix.json
            carry_over.json
            new_manifest.json
          if-no-files-found: warn
          retention-days: 1

  patch-apps:
    name: Read Configuration
    needs: [check-updates, download-tools]
    runs-on: ubuntu-latest
    if: needs.check-updates.outputs.has_updates == 'true'
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Build Matrix from Check
        id: read-matrix
        run: |
          MATRIX='${{ needs.check-updates.outputs.build_matrix }}'
          if [ -z "$MATRIX" ] || [ "$MATRIX" = "null" ]; then
            echo "Empty matrix from check; falling back to full patch-config.json"
            MATRIX=$(jq -c '.patch_list' patch-config.json)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX" | head -c 1000

  build-apps:
    name: Build Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cached Tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Start FlareSolverr
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          echo "[*] Waiting for FlareSolverr to start..."
          until curl -s -f http://localhost:8191/ > /dev/null; do
              sleep 2
          done
          echo "[+] FlareSolverr is ready."

      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 30)).$((RANDOM % 100))
          
          python -m src
          rm -f revenge-xposed.apk

      - name: Record Build Outputs
        if: always()
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
        run: |
          mkdir -p build_records
          # Record every produced APK so manifest can map (app, source, arch) -> filename
          for apk in *.apk; do
            [ -e "$apk" ] || continue
            # record_build.py now detects arch from filename automatically
            APK_PATH="$apk" python scripts/record_build.py || true
          done
          echo "Records produced:"
          ls -la build_records/ 2>/dev/null || echo "(no records)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

      - name: Upload Build Records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-records-${{ matrix.app_name }}-${{ matrix.source }}
          path: build_records/
          if-no-files-found: ignore

  create-single-release:
    name: Create Single Release
    needs: [check-updates, build-apps]
    runs-on: ubuntu-latest
    if: always() && needs.check-updates.outputs.has_updates == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Plan
        uses: actions/download-artifact@v4
        with:
          name: build-plan
          path: ./build-plan
        continue-on-error: true

      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks
          pattern: apk-*
          if-no-files-found: warn

      - name: Download All Build Records
        uses: actions/download-artifact@v4
        with:
          path: ./all-records
          pattern: build-records-*
        continue-on-error: true

      - name: Check if Any APKs Were Built
        id: check-apks
        run: |
          built_count=$(find ./all-apks -name "*.apk" 2>/dev/null | wc -l)
          echo "Built APKs: $built_count"

          if [ "$built_count" -eq 0 ]; then
            echo "❌ No rebuilt APKs available"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "✅ $built_count rebuilt APK(s) ready for release"
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Collect All APKs
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          mkdir -p ./release-apks
          echo "📦 Collecting rebuilt APKs..."
          find ./all-apks -name "*.apk" -exec cp -f {} ./release-apks/ \; 2>/dev/null || true

          echo "📁 APKs ready for release:"
          ls -la ./release-apks/

          final_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")
          echo "📊 Total APKs: $final_count"

      - name: Build Final Manifest
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          echo "🧾 Building manifest.json from build-plan + build records..."
          # The new_manifest.json (post-plan baseline) lives in the build-plan artifact
          if [ -f ./build-plan/new_manifest.json ]; then
            cp ./build-plan/new_manifest.json ./new_manifest.json
          fi
          # Flatten all per-build records into one directory
          mkdir -p build_records
          if [ -d ./all-records ]; then
            find ./all-records -name "*.json" -exec cp {} build_records/ \; 2>/dev/null || true
          fi
          python scripts/merge_manifest.py || {
            echo "⚠️ merge_manifest.py failed; continuing without manifest update."
            rm -f manifest.json
          }
          if [ -f manifest.json ]; then
            echo "✅ manifest.json built:"
            jq '.entries | length' manifest.json || true
            cp manifest.json ./release-apks/manifest.json
          fi

      - name: Validate GitHub Auth
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/validate_github_auth.py

      - name: Check Existing Release
        if: steps.check-apks.outputs.skip_release == 'false'
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Release 'latest' exists; assets will be updated in place."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "📭 Release 'latest' does not exist; it will be created."
          fi
      
      - name: Generate Release Notes
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Generating release notes..."

          if [ "${{ steps.check-release.outputs.release_exists }}" = "true" ]; then
            gh release view latest --json assets --jq '.assets[].name' > current_assets.txt
          else
            : > current_assets.txt
          fi

          for apk in ./release-apks/*.apk; do
            [ -f "$apk" ] || continue
            basename "$apk" >> current_assets.txt
          done

          if [ -f ./release-apks/manifest.json ]; then
            echo "manifest.json" >> current_assets.txt
          fi

          sort -u current_assets.txt > release_assets.txt

          cat > release_notes.md << 'EOF'
          # Patched APKs - Auto Built
          
          ## 📱 Available Apps
          
          EOF

          while read -r filename; do
            [ -n "$filename" ] || continue
            echo "- $filename" >> release_notes.md
          done < release_assets.txt

          cat >> release_notes.md << 'EOF'
          ---
          
          ## ⚙️ Build Information
          - **Auto-built daily at 2 AM UTC**
          - **Multiple architecture support** (arm64-v8a, armeabi-v7a, universal)
          - **Latest patches**
          - **Updated automatically**
          
          ## 📊 Architecture Guide
          - **arm64-v8a**: Modern ARM devices (2014+)
          - **armeabi-v7a**: Older ARM devices
          - **universal**: All ARM devices (larger file)
          
          ## ⚠️ Disclaimer
          These APKs are built automatically. Use at your own risk.
          
          ## 🔄 Update Schedule
          - Automatic updates daily at 2 AM UTC
          - Manual updates available via workflow dispatch
          - Creates `latest` if missing and uploads rebuilt assets in place
          EOF
      
      - name: Upload Or Create Release
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Publishing rebuilt assets to release..."

          # Count APKs
          apk_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")

          if [ $apk_count -eq 0 ]; then
            echo "❌ No APKs found to release"
            exit 1
          fi

          echo "📦 Releasing $apk_count APK(s)..."

          # Build the asset list: APKs + optional manifest.json
          ASSETS=( ./release-apks/*.apk )
          if [ -f ./release-apks/manifest.json ]; then
            ASSETS+=( ./release-apks/manifest.json )
            echo "📎 Including manifest.json"
          fi

          if [ "${{ steps.check-release.outputs.release_exists }}" = "true" ]; then
            echo "⬆️ Uploading rebuilt assets in place and refreshing release metadata..."
            
            # Delete old APK versions that are being replaced
            for apk in "${ASSETS[@]}"; do
              if [[ "$apk" == *.apk ]]; then
                filename=$(basename "$apk")
                prefix=$(echo "$filename" | sed -r 's/-v[0-9].*\.apk$//')
                if [ -f current_assets.txt ]; then
                  old_assets=$(grep -E "^${prefix}-v[0-9].*\.apk$" current_assets.txt || true)
                  for old_asset in $old_assets; do
                    if [ "$old_asset" != "$filename" ]; then
                      echo "🗑️ Deleting old version $old_asset from latest release..."
                      gh release delete-asset latest "$old_asset" -y || true
                    fi
                  done
                fi
              fi
            done
            
            # Upload new APKs and manifest
            gh release upload latest "${ASSETS[@]}" --clobber
            gh release edit latest \
              --title "Patched APKs - $(date +'%Y-%m-%d %H:%M')" \
              --notes-file release_notes.md
          else
            echo "🆕 Creating 'latest' release..."
            gh release create "latest" \
              --title "Patched APKs - $(date +'%Y-%m-%d %H:%M')" \
              --notes-file release_notes.md \
              "${ASSETS[@]}" \
              --latest
          fi

          echo "✅ Release publish step completed successfully!"
      
      - name: Display Release URL
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view latest --json url --jq .url)
          echo "🔗 Release URL: $release_url"
          echo ""
          echo "📦 Direct Download Links:"
          for apk in ./release-apks/*.apk; do
            filename=$(basename "$apk")
            echo "- $filename: $release_url/download/$filename"
          done

  cleanup:
    name: Cleanup Workflow Runs
    needs: [build-apps, create-single-release]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
