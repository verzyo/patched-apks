name: Sync with Upstream
on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 3 AM CEST
  workflow_dispatch: { }
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: |
          git remote add upstream https://github.com/RookieEnough/morphe-AutoBuilds.git
          git fetch upstream

      - name: Merge Upstream Changes
        run: |
          git merge upstream/main -m "Merge upstream changes" -X ours

      - name: Push Changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
