name: Manual Patch and Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (from apps/ folder)'
        required: true
        type: string
        default: 'youtube'
      source:
        description: 'Source name (from sources/ folder)'
        required: true
        type: string
        default: 'revanced'
      version:
        description: 'Specific version (leave empty for latest)'
        required: false
        type: string
        default: ''
      architecture:
        description: 'Architecture to build'
        required: false
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - universal
        default: 'universal'
      replace_in_release:
        description: 'Replace APK in existing release'
        required: true
        type: boolean
        default: true

jobs:
  manual-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set Specific Version (if provided)
        if: ${{ inputs.version != '' }}
        run: |
          # Update app config with specific version
          for dir in apps/apkmirror apps/apkpure apps/uptodown; do
            config_file="$dir/${{ inputs.app_name }}.json"
            if [ -f "$config_file" ]; then
              echo "Updating $config_file with version ${{ inputs.version }}"
              # Update JSON with specific version
              python -c "
              import json, sys, os
              with open('$config_file', 'r') as f:
                  config = json.load(f)
              config['version'] = '${{ inputs.version }}'
              with open('$config_file', 'w') as f:
                  json.dump(config, f, indent=2)
              "
              echo "Updated: $config_file"
              break
            fi
          done
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Start FlareSolverr
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          echo "[*] Waiting for FlareSolverr to start..."
          until curl -s -f http://localhost:8191/ > /dev/null; do
              sleep 2
          done
          echo "[+] FlareSolverr is ready."

      - name: Build APK
        env:
          APP_NAME: ${{ inputs.app_name }}
          SOURCE: ${{ inputs.source }}
          ARCH: ${{ inputs.architecture }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔧 Building ${{ inputs.app_name }} with ${{ inputs.source }} for ${{ inputs.architecture }} architecture..."
          python -m src
          rm -f revenge-xposed.apk
      
      - name: Find Built APK
        id: find-apk
        run: |
          # Find the built APK file(s)
          apk_files=$(ls -1 *.apk 2>/dev/null)
          if [ -z "$apk_files" ]; then
            echo "❌ No APK files found"
            exit 1
          fi
          
          # Fix for multi-line output in GitHub Actions
          {
            echo "apk_files<<EOF"
            echo "$apk_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          echo "apk_count=$(echo "$apk_files" | wc -l)" >> "$GITHUB_OUTPUT"
          
          # Print for debugging
          echo "Found these APKs:"
          echo "$apk_files"
      
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual-apk-${{ inputs.app_name }}-${{ inputs.architecture }}
          path: "*.apk"
      
      - name: Check Existing Release
        if: ${{ inputs.replace_in_release == true }}
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            echo "✅ Release 'latest' exists"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Release 'latest' does not exist"
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Update Release
        if: ${{ inputs.replace_in_release == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Updating release efficiently..."
          
          # 1. GENERATE FILE LIST FOR NOTES
          # We fetch the list of names via API so the release notes remain accurate
          # without needing to download the actual heavy APK files.
          if [ "${{ steps.check-release.outputs.release_exists }}" == "true" ]; then
            gh release view latest --json assets --jq '.assets[].name' > current_assets.txt
          else
            touch current_assets.txt
          fi
          
          # Add the new APK name(s) to the text file
          for apk in *.apk; do
            echo "$apk" >> current_assets.txt
          done
          
          # 2. CREATE RELEASE NOTES
          cat > release_notes.md << EOF
          # Morphe APKs
          
          ## 📱 Available Apps
          EOF
          
          # Sort and use 'unique' to remove duplicates in the text list
          sort -u current_assets.txt | while read filename; do
            echo "- $filename" >> release_notes.md
          done
          
          cat >> release_notes.md << EOF
          
          ---
          
          **Last Update:** $(date)
          **Updated App:** ${{ inputs.app_name }}
          **Architecture:** ${{ inputs.architecture }}
          **Source:** ${{ inputs.source }}
          
          Auto-updates daily at 6 AM UTC.
          EOF
          
          # 3. PERFORM UPDATE (CLOBBER) OR CREATE
          if [ "${{ steps.check-release.outputs.release_exists }}" == "true" ]; then
            echo "⬆️ Uploading new assets (clobbering existing)..."
            # --clobber overwrites the file if it exists, adds it if it doesn't
            gh release upload latest *.apk --clobber
            
            echo "📝 Updating release title and notes..."
            gh release edit latest \
              --title "Morphe APKs - $(date +'%Y-%m-%d %H:%M')" \
              --notes-file release_notes.md
              
          else
            echo "🚀 Creating new release..."
            gh release create "latest" \
              --title "Morphe APKs - $(date +'%Y-%m-%d %H:%M')" \
              --notes-file release_notes.md \
              *.apk \
              --latest
          fi
          
          echo "✅ Release updated successfully!"
      
      - name: Show Download Links
        if: ${{ inputs.replace_in_release == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view latest --json url --jq .url)
          echo "🔗 Updated Release URL: $release_url"
          echo ""
          echo "📦 Direct APK links:"
          for apk in *.apk; do
            echo "  - $release_url/download/$apk"
          done
      
      - name: Cleanup Version Override
        if: ${{ inputs.version != '' && always() }}
        run: |
          # Reset version to empty in configs
          for dir in apps/apkmirror apps/apkpure apps/uptodown; do
            config_file="$dir/${{ inputs.app_name }}.json"
            if [ -f "$config_file" ]; then
              echo "Resetting version in $config_file"
              python -c "
              import json, sys, os
              with open('$config_file', 'r') as f:
                  config = json.load(f)
              config['version'] = ''
              with open('$config_file', 'w') as f:
                  json.dump(config, f, indent=2)
              "
            fi
          done
